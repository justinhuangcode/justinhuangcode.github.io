<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif">
  <defs>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="shSm" x="-1%" y="-1%" width="102%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.05"/>
    </filter>
    <marker id="aR" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 5 2, 0 4" fill="#f70515"/>
    </marker>
    <marker id="aG" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 5 2, 0 4" fill="#999"/>
    </marker>
  </defs>

  <rect width="900" height="640" rx="12" fill="#f7f7f8"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">🦞 OpenClaw 架構一覽</text>
  <text x="450" y="48" text-anchor="middle" font-size="11" fill="#999">頻道 → 閘道 → Node · 四層記憶 · Unix 極簡</text>

  <!-- Channel Layer -->
  <g transform="translate(40, 58)">
    <rect width="820" height="30" rx="8" fill="#f70515" filter="url(#sh)"/>
    <text x="410" y="12" text-anchor="middle" font-size="8.5" fill="#fff" font-weight="600" letter-spacing="1">頻道層</text>
    <text x="410" y="24" text-anchor="middle" font-size="8.5" fill="#fff">WhatsApp · Telegram · Discord · Slack · 飛書 · LINE · Teams 及 20+ 頻道</text>
  </g>

  <!-- Arrows: Channel → Gateway -->
  <g stroke="#f70515" stroke-width="2" fill="none" marker-end="url(#aR)">
    <line x1="250" y1="88" x2="250" y2="104"/>
    <line x1="450" y1="88" x2="450" y2="104"/>
    <line x1="650" y1="88" x2="650" y2="104"/>
  </g>

  <!-- GATEWAY -->
  <g transform="translate(40, 106)">
    <rect width="820" height="416" rx="10" fill="#fff" filter="url(#sh)"/>
    <rect width="820" height="4" rx="2" fill="#f70515"/>

    <text x="410" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#f70515" letter-spacing="1.5">閘道 GATEWAY</text>

    <!-- Security band -->
    <g transform="translate(16, 40)">
      <rect width="788" height="24" rx="5" fill="#fef2f2"/>
      <rect width="4" height="24" rx="2" fill="#f70515"/>
      <text x="20" y="16" font-size="10.5" fill="#c00411" font-weight="600">安全</text>
      <text x="56" y="16" font-size="10" fill="#888">私聊配對 → 白名單 → 群組規則 · 會話隔離</text>
    </g>

    <!-- Channel Adapter Layer -->
    <g transform="translate(16, 76)">
      <rect width="788" height="42" rx="6" fill="#fff" filter="url(#shSm)"/>
      <text x="394" y="16" text-anchor="middle" font-size="11" fill="#f70515" font-weight="600">頻道適配層</text>
      <text x="394" y="32" text-anchor="middle" font-size="9" fill="#888">驗證 · 正規化 · 存取控制 · 格式化</text>
    </g>

    <!-- Arrow: Adapter → Router -->
    <line x1="410" y1="122" x2="410" y2="138" stroke="#f70515" stroke-width="2" marker-end="url(#aR)"/>

    <!-- Multi-Agent Router -->
    <g transform="translate(16, 138)">
      <rect width="788" height="42" rx="6" fill="#fff" filter="url(#shSm)"/>
      <rect width="788" height="3" rx="1.5" fill="#f70515"/>
      <text x="394" y="20" text-anchor="middle" font-size="13" fill="#f70515" font-weight="700">多 Agent 路由</text>
      <text x="394" y="35" text-anchor="middle" font-size="9" fill="#888">綁定規則 · 最具體匹配優先</text>
    </g>

    <!-- Arrow: Router → Runtime -->
    <line x1="410" y1="184" x2="410" y2="200" stroke="#f70515" stroke-width="2.5" marker-end="url(#aR)"/>

    <!-- Session + Memory (left) -->
    <g transform="translate(16, 200)">
      <rect width="210" height="108" rx="6" fill="#fff" filter="url(#sh)"/>
      <rect width="210" height="3" rx="1.5" fill="#f70515"/>
      <text x="105" y="22" text-anchor="middle" font-size="12" fill="#f70515" font-weight="700">對話 + 記憶</text>
      <text x="105" y="40" text-anchor="middle" font-size="9" fill="#666">四層：SOUL · TOOLS · USER · Session</text>
      <g transform="translate(12, 54)">
        <rect x="0" y="0" width="86" height="18" rx="3" fill="#f5f5f5"/>
        <text x="43" y="13" text-anchor="middle" font-size="8" fill="#666">MEMORY.md</text>
        <rect x="92" y="0" width="86" height="18" rx="3" fill="#f5f5f5"/>
        <text x="135" y="13" text-anchor="middle" font-size="8" fill="#666">每日日誌</text>
        <rect x="0" y="24" width="86" height="18" rx="3" fill="#f5f5f5"/>
        <text x="43" y="37" text-anchor="middle" font-size="8" fill="#666">預壓縮</text>
        <rect x="92" y="24" width="86" height="18" rx="3" fill="#f5f5f5"/>
        <text x="135" y="37" text-anchor="middle" font-size="8" fill="#666">向量搜尋</text>
      </g>
    </g>

    <!-- Agent Runtime (center) -->
    <g transform="translate(240, 200)">
      <rect width="340" height="108" rx="6" fill="#fff" filter="url(#sh)"/>
      <rect width="340" height="4" rx="2" fill="#f70515"/>
      <text x="170" y="22" text-anchor="middle" font-size="14" fill="#f70515" font-weight="700">Agent 執行環境</text>
      <text x="170" y="36" text-anchor="middle" font-size="9.5" fill="#666">衍生自 Pi-mono · 所有 Agent 的執行核心</text>
      <g transform="translate(18, 48)" font-size="9" fill="#c00411">
        <rect x="0" y="0" width="146" height="22" rx="4" fill="#fef2f2"/>
        <text x="73" y="15" text-anchor="middle">對話解析</text>
        <rect x="156" y="0" width="148" height="22" rx="4" fill="#fef2f2"/>
        <text x="230" y="15" text-anchor="middle">SOUL.md + 上下文</text>
        <rect x="0" y="26" width="146" height="22" rx="4" fill="#fef2f2"/>
        <text x="73" y="41" text-anchor="middle">模型串流呼叫</text>
        <rect x="156" y="26" width="148" height="22" rx="4" fill="#fef2f2"/>
        <text x="230" y="41" text-anchor="middle">工具執行 + 持久化</text>
      </g>
    </g>

    <!-- Tool System (right) -->
    <g transform="translate(594, 200)">
      <rect width="210" height="108" rx="6" fill="#fff" filter="url(#sh)"/>
      <rect width="210" height="3" rx="1.5" fill="#f70515"/>
      <text x="105" y="22" text-anchor="middle" font-size="12" fill="#f70515" font-weight="700">工具系統</text>
      <text x="105" y="40" text-anchor="middle" font-size="9" fill="#666">4 核心工具 + 55 內建 Skills</text>
      <g transform="translate(12, 54)">
        <rect x="0" y="0" width="178" height="18" rx="3" fill="#f5f5f5"/>
        <text x="89" y="13" text-anchor="middle" font-size="8" fill="#666">Read  Write  Edit  Bash</text>
        <rect x="0" y="24" width="86" height="18" rx="3" fill="#f5f5f5"/>
        <text x="43" y="37" text-anchor="middle" font-size="8" fill="#666">55 內建</text>
        <rect x="92" y="24" width="86" height="18" rx="3" fill="#f5f5f5"/>
        <text x="135" y="37" text-anchor="middle" font-size="8" fill="#666">ClawHub Skills</text>
      </g>
    </g>

    <!-- Horizontal arrows: Runtime ↔ Side modules -->
    <line x1="238" y1="254" x2="228" y2="254" stroke="#999" stroke-width="1.2" marker-end="url(#aG)"/>
    <line x1="582" y1="254" x2="592" y2="254" stroke="#999" stroke-width="1.2" marker-end="url(#aG)"/>

    <!-- Agent Workspace -->
    <g transform="translate(16, 320)">
      <rect width="788" height="36" rx="6" fill="#fef2f2"/>
      <rect width="4" height="36" rx="2" fill="#f70515"/>
      <text x="394" y="14" text-anchor="middle" font-size="10" fill="#c00411" font-weight="600">Agent 工作區</text>
      <text x="394" y="28" text-anchor="middle" font-size="8.5" fill="#888">AGENTS.md · SOUL.md · USER.md · MEMORY.md · HEARTBEAT.md · memory/ · skills/ · sessions.json</text>
    </g>

    <!-- Configuration + Plugin System -->
    <g transform="translate(16, 368)">
      <rect width="788" height="34" rx="6" fill="#f0f0f0"/>
      <text x="394" y="14" text-anchor="middle" font-size="10" fill="#888" font-weight="600">組態 + 外掛系統</text>
      <text x="394" y="28" text-anchor="middle" font-size="8.5" fill="#aaa">熱重載 · Plugin SDK · 40+ 擴充</text>
    </g>
  </g>

  <!-- Dashed arrows from Gateway to externals -->
  <g stroke="#f70515" stroke-width="1.5" fill="none" marker-end="url(#aR)" stroke-dasharray="4,3">
    <line x1="360" y1="522" x2="239" y2="548"/>
    <line x1="540" y1="522" x2="661" y2="548"/>
  </g>

  <!-- Model Providers -->
  <g transform="translate(40, 550)">
    <rect width="398" height="40" rx="8" fill="#f70515" filter="url(#sh)"/>
    <text x="199" y="15" text-anchor="middle" font-size="9" fill="#fff" font-weight="600" letter-spacing="0.8">大模型供應商</text>
    <text x="199" y="30" text-anchor="middle" font-size="8.5" fill="#fff">Anthropic · OpenAI · DeepSeek · MiniMax · GLM · Qwen · Gemini · 本地模型</text>
  </g>

  <!-- Node Layer -->
  <g transform="translate(462, 550)">
    <rect width="398" height="40" rx="8" fill="#f70515" filter="url(#sh)"/>
    <text x="199" y="15" text-anchor="middle" font-size="9" fill="#fff" font-weight="600" letter-spacing="0.8">Node 執行環境</text>
    <text x="199" y="30" text-anchor="middle" font-size="8.5" fill="#fff">macOS · iOS · Android · Canvas · Camera · Shell</text>
  </g>

</svg>
